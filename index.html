<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#ffd700;--coral:#ff6b6b;--mint:#51cf66;--sky:#74c0fc;--purple:#da77f2;--orange:#ffa94d}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 30%,#0f3460 60%,#0a1628 100%);min-height:100vh;color:white;overflow-x:hidden}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;border-radius:50%;background:rgba(255,255,255,0.15);animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* SCREENS */
.screen{display:none;position:relative;z-index:10;min-height:100vh;padding-bottom:220px}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* WELCOME */
#welcome-screen{text-align:center;gap:20px}
.game-logo{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,3.5rem);background:linear-gradient(135deg,var(--gold),var(--orange),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 4px 15px rgba(255,215,0,0.3));animation:logoFloat 3s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.subtitle{font-size:1.1rem;color:var(--sky);margin-top:-10px}
.input-group{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:15px}
.input-group label{font-size:1.2rem;color:var(--gold);font-weight:700}
.name-input{padding:12px 24px;border-radius:50px;border:3px solid var(--sky);background:rgba(255,255,255,0.08);color:white;font-size:1.2rem;text-align:center;font-family:'Nunito',sans-serif;outline:none;width:280px;transition:all 0.3s}
.name-input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.3);background:rgba(255,255,255,0.12)}
.name-input::placeholder{color:rgba(255,255,255,0.35)}

/* HOW TO PLAY */
.btn-howto{background:none;border:2px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);padding:8px 20px;border-radius:25px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:0.9rem;margin-top:8px;transition:all 0.3s}
.btn-howto:hover{border-color:var(--gold);color:var(--gold)}
.howto-box{position:relative;background:rgba(255,255,255,0.08);backdrop-filter:blur(15px);border:2px solid rgba(255,255,255,0.15);border-radius:20px;padding:25px 30px;margin-top:12px;max-width:520px;text-align:left;line-height:1.7;font-size:0.95rem;color:rgba(255,255,255,0.9);animation:fadeIn 0.3s ease}
.howto-box h3{font-family:'Fredoka One',cursive;color:var(--gold);margin-bottom:10px;font-size:1.1rem;text-align:center}
.howto-box ol{padding-left:20px;margin:0}
.howto-box li{margin-bottom:6px}
.howto-box .howto-tip{margin-top:10px;padding:8px 12px;background:rgba(255,215,0,0.1);border-radius:10px;border-left:3px solid var(--gold);font-size:0.85rem;color:var(--gold)}
.howto-close{position:absolute;top:8px;right:14px;font-size:1.5rem;cursor:pointer;color:rgba(255,255,255,0.5);transition:color 0.2s}
.howto-close:hover{color:white}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* LANG */
.lang-bar{position:fixed;top:12px;right:12px;display:flex;gap:5px;z-index:999;background:rgba(0,0,0,0.4);padding:5px 8px;border-radius:30px;backdrop-filter:blur(10px)}
.lang-btn{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;background:rgba(255,255,255,0.1)}
.lang-btn:hover{transform:scale(1.15)}
.lang-btn.active{border-color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,0.4)}

/* BUTTONS */
.btn{padding:12px 32px;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--orange));color:#1a1a2e}
.btn-continent{background:rgba(255,255,255,0.08);color:white;border:2px solid rgba(255,255,255,0.15);padding:18px 25px;font-size:1.2rem;min-width:200px}
.btn-continent:hover{background:rgba(255,255,255,0.15);border-color:var(--gold)}

/* SETUP */
#setup-screen{text-align:center;gap:15px;padding-top:60px}
.setup-title{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--gold)}
.setup-label{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--sky);margin-top:8px}
.option-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.q-option{width:80px;height:80px;border-radius:18px;border:3px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:white;font-family:'Fredoka One',cursive;font-size:1.8rem;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.q-option:hover,.q-option.selected{border-color:var(--gold);background:rgba(255,215,0,0.15);transform:scale(1.08);box-shadow:0 0 15px rgba(255,215,0,0.2)}
.diff-btn{padding:12px 22px;border-radius:18px;border:3px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:white;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:all 0.3s;text-align:center;min-width:110px}
.diff-btn .diff-icon{font-size:1.6rem;display:block;margin-bottom:2px}
.diff-btn:hover,.diff-btn.selected{transform:scale(1.08);box-shadow:0 0 15px rgba(255,215,0,0.2)}
.diff-btn.easy.selected,.diff-btn.easy:hover{border-color:var(--mint);background:rgba(81,207,102,0.15)}
.diff-btn.medium.selected,.diff-btn.medium:hover{border-color:var(--orange);background:rgba(255,169,77,0.15)}
.diff-btn.hard.selected,.diff-btn.hard:hover{border-color:var(--coral);background:rgba(255,107,107,0.15)}
.cat-btn{padding:14px 24px;border-radius:18px;border:3px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:white;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:all 0.3s;text-align:center;min-width:130px}
.cat-btn .cat-icon{font-size:1.8rem;display:block;margin-bottom:3px}
.cat-btn:hover,.cat-btn.selected{border-color:var(--purple);background:rgba(218,119,242,0.15);transform:scale(1.08)}

/* CONTINENT */
#continent-screen{text-align:center;gap:18px}
.continent-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;max-width:650px;width:90%}

/* QUIZ */
#quiz-screen{padding-top:15px}
.quiz-layout{display:flex;width:95%;max-width:1300px;gap:20px;align-items:flex-start;margin:0 auto}
.quiz-main{flex:1;min-width:0}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(0,0,0,0.3);border-radius:12px;margin-bottom:12px;backdrop-filter:blur(10px);flex-wrap:wrap;gap:6px}
.score-display{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--gold)}
.diff-badge{font-size:0.7rem;padding:2px 8px;border-radius:15px;font-family:'Fredoka One',cursive;letter-spacing:1px}
.diff-badge.easy{background:rgba(81,207,102,0.25);color:var(--mint)}
.diff-badge.medium{background:rgba(255,169,77,0.25);color:var(--orange)}
.diff-badge.hard{background:rgba(255,107,107,0.25);color:var(--coral)}
.progress-bar-container{flex:1;min-width:80px;height:10px;background:rgba(255,255,255,0.1);border-radius:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--sky));border-radius:8px;transition:width 0.5s ease}
.question-counter{font-weight:700;color:var(--sky);font-size:0.9rem}
.quiz-card{background:rgba(255,255,255,0.06);border-radius:20px;padding:25px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);margin-bottom:12px}
.clue-type{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--purple);margin-bottom:6px;text-transform:uppercase;letter-spacing:2px}
.clue-content{font-size:1.4rem;line-height:1.5;margin-bottom:18px;min-height:70px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.clue-content .flag-display{font-size:5rem;line-height:1}
.clue-content .flag-img{width:200px;height:133px;object-fit:cover;border-radius:10px;border:3px solid rgba(255,255,255,0.3);box-shadow:0 4px 15px rgba(0,0,0,0.4);transition:transform 0.3s}
.clue-content .flag-img:hover{transform:scale(1.1)}
.clue-content .silhouette-img{width:200px;height:140px;object-fit:contain;filter:brightness(0) invert(1) drop-shadow(0 0 6px rgba(116,192,252,0.5));transition:transform 0.3s}
.clue-content .silhouette-img:hover{transform:scale(1.1)}
.clue-content .food-emoji{font-size:2.5rem}
.clue-content .hint-text{font-size:1.2rem;color:var(--sky);font-style:italic;max-width:450px;text-align:center;line-height:1.4}
.clue-content .math-display{font-size:2rem;font-family:'Fredoka One',cursive;color:var(--gold);background:rgba(0,0,0,0.2);padding:15px 30px;border-radius:15px;border:2px solid rgba(255,215,0,0.2)}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.option-btn{padding:14px 16px;border-radius:12px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:white;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:'Nunito',sans-serif}
.option-btn:hover:not(.disabled){border-color:var(--sky);background:rgba(116,192,252,0.15);transform:translateY(-2px)}
.option-btn.correct{border-color:var(--mint);background:rgba(81,207,102,0.25);animation:correctPulse 0.5s ease}
.option-btn.wrong{border-color:var(--coral);background:rgba(255,107,107,0.25);animation:shake 0.5s ease}
.option-btn.disabled{pointer-events:none;opacity:0.6}
.option-btn.reveal-correct{border-color:var(--mint);background:rgba(81,207,102,0.15)}
@keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.next-btn-area{display:flex;justify-content:center;margin-top:8px}

/* LEADERBOARD */
.leaderboard{width:260px;flex-shrink:0;background:rgba(0,0,0,0.3);border-radius:18px;padding:15px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);max-height:calc(100vh - 250px);overflow-y:auto}
.lb-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--gold);text-align:center;margin-bottom:10px;letter-spacing:1px}
.lb-entry{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:10px;margin-bottom:4px;font-size:0.85rem;transition:background 0.3s}
.lb-entry:nth-child(2){background:rgba(255,215,0,0.15)}
.lb-entry:nth-child(3){background:rgba(192,192,192,0.1)}
.lb-entry:nth-child(4){background:rgba(205,127,50,0.1)}
.lb-rank{font-family:'Fredoka One',cursive;width:24px;text-align:center;color:var(--gold)}
.lb-name{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{font-family:'Fredoka One',cursive;color:var(--mint)}
.lb-detail{font-size:0.7rem;color:rgba(255,255,255,0.5)}
.lb-empty{text-align:center;color:rgba(255,255,255,0.4);font-size:0.85rem;padding:15px 0}

/* DRESSUP - TOCA BOCA SVG */
.dressup-panel{width:420px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;align-items:center}
.char-container{width:400px;height:580px;border-radius:28px;border:4px solid rgba(255,255,255,0.12);position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4);cursor:grab}
.char-container:active{cursor:grabbing}
.char-svg-wrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.1s ease-out}
.char-svg-wrap svg{width:100%;height:100%}
.char-svg-wrap svg *{transition:fill 0.4s ease,stroke 0.4s ease,opacity 0.4s ease}
/* Hidden */
.svg-hidden{display:none!important}

/* Dressup choice panel */
.du-step-label{font-family:'Fredoka One',cursive;font-size:0.85rem;color:var(--gold);text-align:center}
.du-choices{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:100%}
.du-choice{padding:7px;border-radius:12px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:5px;font-size:0.8rem;font-weight:700;color:white;font-family:'Nunito',sans-serif;min-height:40px}
.du-choice:hover{border-color:var(--gold);background:rgba(255,215,0,0.12);transform:scale(1.04)}
.du-choice.picked{border-color:var(--mint);background:rgba(81,207,102,0.2)}
.du-choice .color-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);flex-shrink:0}
.du-auto-msg{font-size:0.75rem;color:var(--coral);text-align:center;font-style:italic}
.du-reedit{font-size:0.7rem;color:rgba(255,255,255,0.5);text-align:center;cursor:pointer;padding:4px;transition:color 0.3s}
.du-reedit:hover{color:var(--gold)}

@media(max-width:900px){
  .dressup-panel{width:100%;flex-direction:row;flex-wrap:wrap;justify-content:center}
  .char-container{width:300px;height:440px}
}

/* RESULT */
#result-screen{text-align:center;gap:14px}
.result-title{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,5vw,3rem)}
.result-score{font-size:4rem;font-family:'Fredoka One',cursive;color:var(--gold)}
.result-score-100{font-size:1.1rem;color:var(--sky)}
.result-msg{font-size:1.1rem;color:var(--sky);max-width:450px}
.stars-display{font-size:2.5rem;letter-spacing:6px}
.result-thanks{font-size:1rem;color:rgba(255,255,255,0.6);font-style:italic;margin-top:4px}
.result-lb-box{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:18px;padding:16px 20px;width:100%;max-width:500px;margin-top:8px}
.result-lb-title{font-family:'Fredoka One',cursive;color:var(--gold);font-size:1.1rem;margin-bottom:10px;text-align:center}
.result-lb-list{display:flex;flex-direction:column;gap:4px}
.rlb-entry{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;background:rgba(255,255,255,0.04);font-size:0.9rem}
.rlb-entry.rlb-you{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.3)}
.rlb-rank{font-family:'Fredoka One',cursive;width:28px;text-align:center;font-size:1.1rem}
.rlb-name{flex:1;font-weight:700}
.rlb-score{font-family:'Fredoka One',cursive;color:var(--gold);font-size:1.1rem;min-width:35px;text-align:right}
.rlb-meta{font-size:0.75rem;color:rgba(255,255,255,0.4);min-width:80px;text-align:right}

/* AQUARIUM */
.aquarium{position:fixed;bottom:0;left:0;width:100%;height:190px;background:linear-gradient(180deg,rgba(10,22,40,0) 0%,rgba(10,22,40,0.6) 15%,rgba(6,40,80,0.85) 40%,rgba(4,50,90,0.95) 100%);z-index:50;overflow:hidden;border-top:2px solid rgba(116,192,252,0.15)}
.aquarium::before{content:'';position:absolute;top:0;left:0;width:200%;height:4px;background:linear-gradient(90deg,transparent,rgba(116,192,252,0.4),transparent,rgba(116,192,252,0.2),transparent);animation:waterShimmer 4s linear infinite}
@keyframes waterShimmer{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}
.sand{position:absolute;bottom:0;width:100%;height:28px;background:linear-gradient(180deg,#c4956a,#b8864f);border-radius:50% 50% 0 0/12px 12px 0 0}
.seaweed{position:absolute;bottom:24px;width:16px;background:linear-gradient(180deg,#2d8a4e,#1a6b35);border-radius:50% 50% 0 0;transform-origin:bottom center;animation:sway 3s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.3),rgba(116,192,252,0.1));border:1px solid rgba(255,255,255,0.15);animation:bubbleRise linear infinite}
@keyframes bubbleRise{0%{transform:translateY(0) scale(1);opacity:0.7}100%{transform:translateY(-170px) scale(0.5);opacity:0}}
.fish{position:absolute;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.fish-body{position:relative;display:inline-block}
.fish-eat{display:none;position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:0.8rem;font-weight:700;color:var(--gold);animation:eatPop 0.8s ease forwards;pointer-events:none}
@keyframes eatPop{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-18px)}}
.food-pellet{position:absolute;width:9px;height:9px;background:radial-gradient(circle at 35% 35%,#ffcc44,#ff8800,#cc5500);border-radius:50%;z-index:55;box-shadow:0 0 8px rgba(255,153,51,0.6);pointer-events:none}
.coral-deco{position:absolute;bottom:20px;font-size:1.3rem}
.treasure{position:absolute;bottom:20px;font-size:1.5rem}
.confetti-piece{position:fixed;z-index:999;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

@media(max-width:900px){
  .quiz-layout{flex-direction:column}
  .leaderboard{width:100%;max-height:200px;order:-1}
  .lb-entry{font-size:0.8rem}
}
@media(max-width:600px){
  .options-grid{grid-template-columns:1fr}
  .quiz-card{padding:18px}
  .top-bar{justify-content:center}
  .continent-grid{grid-template-columns:1fr 1fr}
  .aquarium{height:150px}
  .lang-bar{top:6px;right:6px}
  .lang-btn{width:28px;height:28px;font-size:1rem}
  .yt-float{top:6px;left:6px;padding:4px 8px}
  .yt-float svg{width:18px;height:18px}
  .yt-float-text{display:none}
  .yt-popup{width:200px;left:-4px}
}

/* YouTube floating button + hover popup */
.yt-float-wrap{position:fixed;top:12px;left:12px;z-index:999}
.yt-float{display:flex;align-items:center;gap:6px;background:rgba(255,0,0,0.15);border:1.5px solid rgba(255,0,0,0.3);padding:5px 12px;border-radius:30px;backdrop-filter:blur(10px);cursor:pointer;transition:all 0.3s}
.yt-float:hover{background:rgba(255,0,0,0.3);border-color:rgba(255,0,0,0.6);transform:scale(1.05)}
.yt-float svg{width:22px;height:22px;flex-shrink:0}
.yt-float-text{font-family:'Fredoka One',cursive;font-size:0.7rem;color:white;letter-spacing:0.5px}
.yt-popup{display:none;position:absolute;top:46px;left:0;width:240px;background:rgba(15,20,40,0.95);border:1.5px solid rgba(255,0,0,0.3);border-radius:16px;padding:14px;backdrop-filter:blur(15px);box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:ytPopIn 0.25s ease;text-align:center}
.yt-popup.visible{display:block}
@keyframes ytPopIn{from{opacity:0;transform:translateY(-8px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.yt-popup-title{font-family:'Fredoka One',cursive;font-size:0.85rem;color:#ff4444;margin-bottom:10px}
.yt-popup-sub{display:inline-flex;align-items:center;gap:6px;background:#cc0000;color:white;padding:8px 18px;border-radius:4px;font-size:0.85rem;font-weight:700;text-decoration:none;font-family:'Nunito',sans-serif;transition:all 0.3s;border:none}
.yt-popup-sub:hover{background:#ff0000;transform:scale(1.05)}

function setLang(lang){
  currentLang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(LANG[lang][k])el.textContent=LANG[lang][k];});
  // Update placeholder
  const nameInput=document.getElementById('player-name');
  if(nameInput){const ph={en:'Name...',tr:'Adın...',es:'Nombre...',ar:'الاسم...',ru:'Имя...'};nameInput.placeholder=ph[lang]||ph.en;}
  // Re-render current question if quiz is active
  if(document.getElementById('quiz-screen').classList.contains('active')&&questions.length>0&&!answeredThisQ){
    renderQuestion();
  }
}

// ==================== MATH QUESTIONS (5-6. sinif) ====================
function generateMathQuestions(count, diff) {
  const qs = [];
  const generators = {
    easy: [genAddSub, genMultSimple, genFractionSimple, genPercentSimple, genGeometrySimple],
    medium: [genMultDiv, genFractionOp, genPercentMid, genGeometryMid, genDecimal, genRatio],
    hard: [genFractionHard, genPercentHard, genGeometryHard, genAlgebra, genExponent, genLCMGCD]
  };
  const gens = generators[diff];
  for (let i = 0; i < count; i++) {
    const gen = gens[Math.floor(Math.random()*gens.length)];
    qs.push(gen());
  }
  return qs;
}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function genAddSub(){const a=rnd(50,500),b=rnd(50,500);const op=Math.random()>0.5;const q=op?`${a} + ${b} = ?`:`${a+b} - ${b} = ?`;const ans=op?a+b:a;const opts=makeOpts(ans,4);return{question:q,answer:ans,options:opts,label:t('mathQ')};}
function genMultSimple(){const a=rnd(3,12),b=rnd(3,12);const ans=a*b;const opts=makeOpts(ans,4);return{question:`${a} x ${b} = ?`,answer:ans,options:opts,label:t('mathQ')};}
function genMultDiv(){const a=rnd(12,25),b=rnd(3,12);if(Math.random()>0.5){const ans=a*b;const opts=makeOpts(ans,4);return{question:`${a} x ${b} = ?`,answer:ans,options:opts,label:t('mathQ')};}else{const product=a*b;const ans=a;const opts=makeOpts(ans,4);return{question:`${product} \u00F7 ${b} = ?`,answer:ans,options:opts,label:t('mathQ')};}}
function genFractionSimple(){const d=rnd(2,6),n=rnd(1,d-1);const d2=rnd(2,6),n2=rnd(1,d2-1);const lcd=lcm(d,d2);const sum_n=n*(lcd/d)+n2*(lcd/d2);const g=gcd(sum_n,lcd);const rn=sum_n/g,rd=lcd/g;const ans=`${rn}/${rd}`;const opts=[ans];while(opts.length<4){const fn=rnd(1,rd*2-1),fd=rd;const s=`${fn}/${fd}`;if(!opts.includes(s))opts.push(s);}shuffle(opts);return{question:`${n}/${d} + ${n2}/${d2} = ?`,answer:ans,options:opts,label:t('mathQ'),isText:true};}
function genFractionOp(){const d=rnd(2,8),n=rnd(1,d*2);const mult=rnd(2,5);const ans_n=n*mult,ans_d=d;const g2=gcd(ans_n,ans_d);const rn=ans_n/g2,rd=ans_d/g2;const ans=rd===1?`${rn}`:`${rn}/${rd}`;const opts=[ans];while(opts.length<4){const fn=rnd(1,rn+5),fd=rd||1;const s=fd===1?`${fn}`:`${fn}/${fd}`;if(!opts.includes(s))opts.push(s);}shuffle(opts);return{question:`${n}/${d} x ${mult} = ?`,answer:ans,options:opts,label:t('mathQ'),isText:true};}
function genFractionHard(){const w=rnd(1,3),n=rnd(1,5),d=rnd(2,6);const imp=(w*d+n);const g2=gcd(imp,d);const ans=`${imp/g2}/${d/g2}`;const display=`${w} ${n}/${d}`;const opts=[ans];while(opts.length<4){const fn=rnd(2,imp+4),fd=d/g2;const s=`${fn}/${fd}`;if(!opts.includes(s))opts.push(s);}shuffle(opts);const l=currentLang;const q=l==='tr'?`${display} kesrini bilesik kesir olarak yaz`:`Convert ${display} to improper fraction`;return{question:q,answer:ans,options:opts,label:t('mathQ'),isText:true};}
function genPercentSimple(){const base=rnd(2,10)*10;const pct=[10,20,25,50][rnd(0,3)];const ans=base*pct/100;const opts=makeOpts(ans,4);return{question:`${base}'${currentLang==='tr'?'in':'of'} %${pct}'${currentLang==='tr'?'i':''}  = ?`,answer:ans,options:opts,label:t('mathQ')};}
function genPercentMid(){const base=rnd(5,20)*10;const pct=rnd(1,9)*5;const ans=base*pct/100;const opts=makeOpts(ans,4);return{question:`${base} x %${pct} = ?`,answer:ans,options:opts,label:t('mathQ')};}
function genPercentHard(){const part=rnd(2,8)*5;const whole=rnd(5,20)*10;while(whole<=part)whole=rnd(5,20)*10;const ans=Math.round(part/whole*100);const opts=makeOpts(ans,4);const q=currentLang==='tr'?`${part}, ${whole}'in yuzde kaci?`:`${part} is what % of ${whole}?`;return{question:q,answer:ans,options:opts,label:t('mathQ'),suffix:'%'};}
function genGeometrySimple(){const a=rnd(3,12),b=rnd(3,12);const ans=a*b;const opts=makeOpts(ans,4);const q=currentLang==='tr'?`Kenar uzunluklari ${a} cm ve ${b} cm olan dikdortgenin alani?`:`Area of rectangle ${a}cm x ${b}cm?`;return{question:q,answer:ans,options:opts,label:t('mathQ'),suffix:' cm\u00B2'};}
function genGeometryMid(){const a=rnd(4,15),h=rnd(3,10);const ans=a*h/2;const opts=makeOpts(ans,4);const q=currentLang==='tr'?`Tabani ${a} cm, yuksekligi ${h} cm olan ucgenin alani?`:`Triangle area: base ${a}cm, height ${h}cm?`;return{question:q,answer:ans,options:opts,label:t('mathQ'),suffix:' cm\u00B2'};}
function genGeometryHard(){const r=rnd(2,10);const ans=Math.round(2*Math.PI*r*10)/10;const opts=[ans+''];while(opts.length<4){const v=(Math.round((ans+(Math.random()-0.5)*ans*0.6)*10)/10)+'';if(!opts.includes(v)&&parseFloat(v)>0)opts.push(v);}shuffle(opts);const q=currentLang==='tr'?`Yaricapi ${r} cm olan dairenin cevresi? (\u03C0=3.14)`:`Circumference of circle r=${r}cm? (\u03C0=3.14)`;return{question:q,answer:ans+'',options:opts,label:t('mathQ'),isText:true,suffix:' cm'};}
function genDecimal(){const a=rnd(1,20)/10,b=rnd(1,20)/10;const ans=Math.round((a+b)*100)/100;const opts=makeOpts(ans,4,true);return{question:`${a} + ${b} = ?`,answer:ans,options:opts,label:t('mathQ')};}
function genRatio(){const a=rnd(2,6),b=rnd(2,6),mult=rnd(2,5);const ans=b*mult;const opts=makeOpts(ans,4);const q=currentLang==='tr'?`${a}/${b} = ${a*mult}/? \u2192 ? = ?`:`${a}/${b} = ${a*mult}/? \u2192 ? = ?`;return{question:q,answer:ans,options:opts,label:t('mathQ')};}
function genAlgebra(){const a=rnd(2,8),b=rnd(3,20);const ans=rnd(2,10);const result=a*ans+b;const opts=makeOpts(ans,4);const q=`${a}x + ${b} = ${result}  \u2192  x = ?`;return{question:q,answer:ans,options:opts,label:t('mathQ')};}
function genExponent(){const base=rnd(2,9),exp=rnd(2,3);const ans=Math.pow(base,exp);const opts=makeOpts(ans,4);const sup=exp===2?'\u00B2':'\u00B3';return{question:`${base}${sup} = ?`,answer:ans,options:opts,label:t('mathQ')};}
function genLCMGCD(){if(Math.random()>0.5){const a=rnd(4,15),b=rnd(4,15);const ans=gcd(a,b);const opts=makeOpts(ans,4);const q=currentLang==='tr'?`EBOB(${a}, ${b}) = ?`:`GCD(${a}, ${b}) = ?`;return{question:q,answer:ans,options:opts,label:t('mathQ')};}else{const a=rnd(3,12),b=rnd(3,12);const ans=lcm(a,b);const opts=makeOpts(ans,4);const q=currentLang==='tr'?`EKOK(${a}, ${b}) = ?`:`LCM(${a}, ${b}) = ?`;return{question:q,answer:ans,options:opts,label:t('mathQ')};}}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;}
function lcm(a,b){return Math.abs(a*b)/gcd(a,b);}
function makeOpts(ans,count,isDecimal){
  const opts=[ans];
  let tries=0;
  while(opts.length<count&&tries<50){
    let v;
    if(isDecimal){v=Math.round((ans+(Math.random()-0.5)*Math.max(ans*0.8,2))*100)/100;}
    else{v=ans+rnd(-Math.max(Math.floor(ans*0.4),2),Math.max(Math.floor(ans*0.4),2));}
    if(v>0&&!opts.includes(v))opts.push(v);
    tries++;
  }
  while(opts.length<count)opts.push(ans+opts.length);
  shuffle(opts);
  return opts;
}

function generateFandomQuestions(source, count, diff) {
  const pool = source.filter(q => {
    if(diff==='easy') return q.diff==='easy';
    if(diff==='medium') return q.diff==='easy'||q.diff==='medium';
    return true; // hard: all
  });
  shuffle(pool);
  return pool.slice(0,Math.min(count,pool.length)).map(q => {
    const l = currentLang;
    const opts = [q.a, ...q.w];
    shuffle(opts);
    return {
      type:'fandom',
      question: q.q[l]||q.q.en,
      answer: q.a[l]||q.a.en,
      options: opts.map(o => o[l]||o.en),
      emoji: q.emoji,
      label: source===HP_QUESTIONS ? '\u26A1 HARRY POTTER' : '\uD83D\uDCA1 STRANGER THINGS'
    };
  });
}

// ==================== DIFFICULTY CONFIG ====================
const DIFF_CONFIG={
  easy:{clues:['flag','food','famous','landmark'],optionCount:4},
  medium:{clues:['flag','silhouette','food','famous','capital','landmark','currency'],optionCount:4},
  hard:{clues:['silhouette','capital','language','currency','population','neighbors'],optionCount:6},
};

// ==================== GAME STATE ====================
let playerName='',questionCount=10,difficulty='medium',selectedCats=new Set(),currentContinent='',questions=[],currentQ=0,score=0,correctCount=0,fishes=[],answeredThisQ=false;

// ==================== CLUE TYPES ====================
function getClue(country,type){
  const l=currentLang,cc=country.code.toLowerCase();
  switch(type){
    case 'flag':return{label:t('flag'),question:t('clueFlag'),display:`<img class="flag-img" src="https://flagcdn.com/w320/${cc}.png" alt="flag" onerror="this.outerHTML='<div class=flag-display>${country.flag}</div>'">`};
    case 'silhouette':return{label:t('silhouette'),question:t('clueSilhouette'),display:`<img class="silhouette-img" src="https://raw.githubusercontent.com/djaiss/mapsicon/master/all/${cc}/vector.svg" alt="shape" onerror="this.src='https://flagcdn.com/w320/${cc}.png';this.className='flag-img'">`};
    case 'food':return{label:t('food'),question:t('clueFood'),display:`<div class="food-emoji">${country.food}</div>`};
    case 'famous':return{label:t('famous'),question:t('clueFamous'),display:`<div style="font-size:1.6rem">${country.famous[l]||country.famous.en}</div>`};
    case 'capital':return{label:t('capital'),question:t('clueCapital',country.capital[l]||country.capital.en),display:`<div style="font-size:2.2rem">\uD83C\uDFDB\uFE0F</div>`};
    case 'language':return{label:t('language'),question:t('clueLanguage',country.language[l]||country.language.en),display:`<div style="font-size:2.2rem">\uD83D\uDDE3\uFE0F</div>`};
    case 'landmark':return{label:t('landmark'),question:t('clueLandmark'),display:`<div style="font-size:1.6rem">\uD83C\uDFDB\uFE0F ${country.landmark[l]||country.landmark.en}</div>`};
    case 'currency':return{label:t('currency'),question:t('clueCurrency',country.currency[l]||country.currency.en),display:`<div style="font-size:2.2rem">\uD83D\uDCB0</div>`};
    case 'population':if(country.population)return{label:t('population'),question:t('cluePopulation',country.population),display:`<div style="font-size:2.5rem">\uD83D\uDC65</div>`};return getClue(country,'famous');
    case 'neighbors':if(country.neighbors)return{label:t('neighbors'),question:t('clueNeighbors'),display:`<div class="hint-text">\uD83D\uDDFA\uFE0F ${country.neighbors[l]||country.neighbors.en}</div>`};return getClue(country,'capital');
    default:return getClue(country,'flag');
  }
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function selectDiff(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');checkReady();}
function toggleCat(c,btn){
  if(selectedCats.has(c)){selectedCats.delete(c);btn.classList.remove('selected');}
  else{selectedCats.add(c);btn.classList.add('selected');}
  checkReady();
}
function checkReady(){
  const ok=document.querySelector('.q-option.selected')&&document.querySelector('.diff-btn.selected')&&selectedCats.size>0;
  document.getElementById('go-next-btn').style.display=ok?'inline-block':'none';
}

}

  selectedGender=gender;
  if(selectedCats.has('geo'))showScreen('continent-screen');
  else startQuiz('none');

// ==================== QUIZ LOGIC ====================
function startQuiz(continent){
  currentContinent=continent;score=0;currentQ=0;correctCount=0;answeredThisQ=false;
  // Always activate dressup
  initDressup();
  document.getElementById('score').textContent='0';
  const badge=document.getElementById('diff-badge');
  const dl={easy:{tr:'KOLAY',en:'EASY'},medium:{tr:'ORTA',en:'MEDIUM'},hard:{tr:'ZOR',en:'HARD'}};
  badge.textContent=dl[difficulty][currentLang]||dl[difficulty].en;
  badge.className='diff-badge '+difficulty;

  questions=[];
  const diff=DIFF_CONFIG;

  // Determine how many of each category
  const cats=[...selectedCats];
  const catCount=cats.length;
  const perCat=Math.floor(questionCount/catCount);
  let remainder=questionCount-perCat*catCount;
  let geoCount=0, mathCount=0, hpCount=0, stCount=0;
  cats.forEach(c=>{
    const n=perCat+(remainder>0?1:0);
    if(remainder>0)remainder--;
    if(c==='geo')geoCount=n;
    else if(c==='math')mathCount=n;
    else if(c==='hp')hpCount=n;
    else if(c==='st')stCount=n;
  });

  // Geo questions
  if(geoCount>0){
    let pool=[];
    if(continent==='all'||continent==='none')Object.values(COUNTRIES).forEach(a=>pool.push(...a));
    else pool=[...COUNTRIES[continent]];
    shuffle(pool);
    const sel=pool.slice(0,Math.min(geoCount,pool.length));
    const clues=diff[difficulty].clues;
    const optCount=diff[difficulty].optionCount;
    sel.forEach(country=>{
      const ct=clues[Math.floor(Math.random()*clues.length)];
      const wrongs=pool.filter(c=>c.code!==country.code);shuffle(wrongs);
      const options=[country,...wrongs.slice(0,optCount-1)];shuffle(options);
      questions.push({type:'geo',country,clueType:ct,options});
    });
  }

  // Math questions
  if(mathCount>0){
    const mqs=generateMathQuestions(mathCount,difficulty);
    mqs.forEach(mq=>questions.push({type:'math',mathData:mq}));
  }

  // Harry Potter questions
  if(hpCount>0){
    const hpqs=generateFandomQuestions(HP_QUESTIONS,hpCount,difficulty);
    hpqs.forEach(q=>questions.push(q));
  }

  // Stranger Things questions
  if(stCount>0){
    const stqs=generateFandomQuestions(ST_QUESTIONS,stCount,difficulty);
    stqs.forEach(q=>questions.push(q));
  }

  if(selectedCats.size>1)shuffle(questions);

  showScreen('quiz-screen');
  renderLeaderboard();
  renderQuestion();
}

function renderQuestion(){
  answeredThisQ=false;
  const q=questions[currentQ];
  document.getElementById('q-counter').textContent=`${currentQ+1}/${questions.length}`;
  document.getElementById('progress-fill').style.width=`${(currentQ/questions.length)*100}%`;
  document.getElementById('next-btn').style.display='none';
  const grid=document.getElementById('options-grid');
  grid.innerHTML='';

  if(q.type==='geo'){
    const clue=getClue(q.country,q.clueType);
    const l=currentLang;
    document.getElementById('clue-type').textContent=clue.label;
    document.getElementById('clue-content').innerHTML=`<div>${clue.question}</div>${clue.display}`;
    grid.style.gridTemplateColumns=q.options.length>4?'1fr 1fr 1fr':'1fr 1fr';
    q.options.forEach(opt=>{
      const btn=document.createElement('button');btn.className='option-btn';
      btn.textContent=opt.name[l]||opt.name.en;
      btn.onclick=()=>handleAnswer(btn,opt.code===q.country.code,q.country.name[l]||q.country.name.en);
      grid.appendChild(btn);
    });
  } else if(q.type==='math') {
    const md=q.mathData;
    document.getElementById('clue-type').textContent=md.label;
    document.getElementById('clue-content').innerHTML=`<div class="math-display">${md.question}</div>`;
    grid.style.gridTemplateColumns=md.options.length>4?'1fr 1fr 1fr':'1fr 1fr';
    md.options.forEach(opt=>{
      const btn=document.createElement('button');btn.className='option-btn';
      const display=md.isText?opt:(opt+(md.suffix||''));
      btn.textContent=display;
      const isCorrect=md.isText?(opt===md.answer):(opt===md.answer);
      btn.onclick=()=>handleAnswer(btn,isCorrect,md.isText?md.answer:(md.answer+(md.suffix||'')));
      grid.appendChild(btn);
    });
  } else if(q.type==='fandom') {
    document.getElementById('clue-type').textContent=q.label;
    document.getElementById('clue-content').innerHTML=`<div style="font-size:3rem">${q.emoji}</div><div>${q.question}</div>`;
    grid.style.gridTemplateColumns='1fr 1fr';
    q.options.forEach(opt=>{
      const btn=document.createElement('button');btn.className='option-btn';
      btn.textContent=opt;
      btn.onclick=()=>handleAnswer(btn,opt===q.answer,q.answer);
      grid.appendChild(btn);
    });
  }
}

function handleAnswer(btn,isCorrect,correctText){
  if(answeredThisQ)return;answeredThisQ=true;
  const allBtns=document.querySelectorAll('.option-btn');
  allBtns.forEach(b=>b.classList.add('disabled'));
  if(isCorrect){
    btn.classList.add('correct');correctCount++;
    score=Math.round(correctCount/questions.length*100);
    document.getElementById('score').textContent=score;
    dropFood();createMiniConfetti(btn);
  }else{
    btn.classList.add('wrong');
    allBtns.forEach(b=>{if(b.textContent==correctText)b.classList.add('reveal-correct');});
  }
  // Dressup: show choice after answer
  if(dressupMode){showDressupChoice(isCorrect);}
  document.getElementById('next-btn').style.display='inline-block';
}

function calcWeightedScore(score,diff,total){
  // Difficulty multiplier: easy=1.0, medium=1.5, hard=2.0
  const diffMult={easy:1.0,medium:1.5,hard:2.0};
  // Question count multiplier: 5=1.0, 10=1.3, 20=1.6
  const qMult=total<=5?1.0:total<=10?1.3:1.6;
  return Math.round(score * (diffMult[diff]||1) * qMult);
}

function showResults(){
  showScreen('result-screen');
  const pct=correctCount/questions.length;
  let titleKey,stars;
  if(pct>=0.9){titleKey='resultGreat';stars='⭐⭐⭐⭐⭐';}
  else if(pct>=0.7){titleKey='resultGood';stars='⭐⭐⭐⭐';}
  else if(pct>=0.5){titleKey='resultOk';stars='⭐⭐⭐';}
  else{titleKey='resultTry';stars='⭐⭐';}
  document.getElementById('result-title').textContent=t(titleKey,playerName);
  document.getElementById('result-score').textContent=score+'/100';
  const catNames=[...selectedCats].map(c=>c==='geo'?t('geo'):c==='math'?t('math'):c==='hp'?'HP':c==='st'?'ST':c).join('+');
  const diffLabel={easy:t('easy'),medium:t('medium'),hard:t('hard')}[difficulty]||difficulty;
  document.getElementById('result-detail').textContent=`${correctCount}/${questions.length} ${t('questionsLabel')} | ${catNames} | ${diffLabel}`;
  document.getElementById('result-msg').textContent=t('scoreText',correctCount,questions.length);
  document.getElementById('stars-display').textContent=stars;
  document.getElementById('result-thanks').textContent=THANKS_MSG[currentLang]||THANKS_MSG.en;
  if(pct>=0.7)bigConfetti();
  for(let i=0;i<5;i++)setTimeout(()=>dropFood(),i*300);
  saveScore();
  renderResultLeaderboard();
}

function getScores(){try{return JSON.parse(localStorage.getItem('arya_quiz_scores')||'[]');}catch(e){return[];}}
function saveScore(){
  const scores=getScores();
  const weighted=calcWeightedScore(score,difficulty,questions.length);
  scores.push({name:playerName,score,weighted,correct:correctCount,total:questions.length,diff:difficulty,cat:[...selectedCats].join('+'),date:Date.now()});
  // Sort by weighted score desc, then by correct count desc as tiebreaker
  scores.sort((a,b)=>(b.weighted||b.score)-(a.weighted||a.score)||(b.correct||0)-(a.correct||0));
  // Keep top 50 all time
  localStorage.setItem('arya_quiz_scores',JSON.stringify(scores.slice(0,50)));
  renderLeaderboard();
}
function renderLeaderboard(){
  const list=document.getElementById('lb-list');
  if(!list)return;
  const scores=getScores();
  if(scores.length===0){list.innerHTML=`<div class="lb-empty">${t('noScores')}</div>`;return;}
  const medals=['🥇','🥈','🥉'];
  list.innerHTML=scores.slice(0,10).map((s,i)=>{
    const rank=i<3?medals[i]:(i+1);
    const cc=s.cat||'';const catIcon=cc.includes('geo')?'🌍':cc.includes('math')?'📐':cc.includes('hp')?'⚡':cc.includes('st')?'💡':'🎲';const multiIcon=cc.includes('+')?'🎲':catIcon;
    return `<div class="lb-entry"><span class="lb-rank">${rank}</span><span class="lb-name">${s.name}</span><span class="lb-score">${s.score}</span><span class="lb-detail">${s.correct||'?'}/${s.total||'?'} ${multiIcon}</span></div>`;
  }).join('');
}
function renderResultLeaderboard(){
  const scores=getScores();
  const titleEl=document.getElementById('result-lb-title');
  titleEl.textContent={en:'ALL TIME BEST',tr:'TÜM ZAMANLARIN EN İYİSİ',es:'MEJORES DE TODOS LOS TIEMPOS',ar:'الأفضل على الإطلاق',ru:'ЛУЧШИЕ ЗА ВСЁ ВРЕМЯ'}[currentLang]||'ALL TIME BEST';
  const list=document.getElementById('result-lb-list');
  if(scores.length===0){list.innerHTML=`<div style="color:rgba(255,255,255,0.4);text-align:center;padding:10px">${t('noScores')}</div>`;return;}
  const medals=['🥇','🥈','🥉'];
  const diffEmoji={easy:'🌱',medium:'🔥',hard:'💀'};
  const currentDate=Date.now();
  list.innerHTML=scores.slice(0,10).map((s,i)=>{
    const rank=i<3?medals[i]:(i+1);
    const isYou=(s.date&&(currentDate-s.date)<5000);
    const de=diffEmoji[s.diff]||'';
    const ws=s.weighted||s.score;
    return `<div class="rlb-entry${isYou?' rlb-you':''}"><span class="rlb-rank">${rank}</span><span class="rlb-name">${s.name}${isYou?' ⬅':''}️</span><span class="rlb-score">${s.score}</span><span class="rlb-meta">${de} ${s.correct||'?'}/${s.total||'?'} (${ws})</span></div>`;
  }).join('');
}

function swimFish(f){
  if(f._feeding)return;
  const go=()=>{
    if(f._feeding)return;
    const x=5+Math.random()*85,y=30+Math.random()*100,dur=f._speed;
    const cx=parseFloat(f.style.left)||50;
    f.style.transition=`left ${dur}s ease, bottom ${dur}s ease`;
    f.style.transform=`scaleX(${x>cx?1:-1})`;
    f.style.left=x+'%';f.style.bottom=y+'px';
    f._timer=setTimeout(go,dur*1000+200);
  };
  f._timer=setTimeout(go,Math.random()*2000);
}

let foodDropX=50;
function dropFood(){
  const aq=document.getElementById('aquarium');
  foodDropX=20+Math.random()*60;
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const p=document.createElement('div');p.className='food-pellet';
      const px=foodDropX+(Math.random()-0.5)*18;
      p.style.left=px+'%';p.style.top='0px';p._st=performance.now();p._dur=1600+Math.random()*500;
      aq.appendChild(p);
      (function anim(now){
        const prog=Math.min((now-p._st)/p._dur,1),y=prog*prog*160;
        p.style.top=y+'px';p.style.opacity=prog>0.85?1-(prog-0.85)/0.15:1;
        p.style.transform=`rotate(${prog*600}deg) scale(${1-prog*0.3})`;
        if(prog<1)requestAnimationFrame(anim);else p.remove();
      })(performance.now());
    },i*90);
  }
  fishes.forEach((f,i)=>setTimeout(()=>feedFish(f),150+i*150));
}
function feedFish(f){
  clearTimeout(f._timer);f._feeding=true;
  const tx=foodDropX+(Math.random()-0.5)*10,ty=110+Math.random()*35;
  const cx=parseFloat(f.style.left)||50;
  f.style.transition='left 0.6s ease-in-out, bottom 0.6s ease-in-out';
  f.style.transform=`scaleX(${tx>cx?1:-1})`;
  f.style.left=tx+'%';f.style.bottom=ty+'px';
  setTimeout(()=>{
    const eat=f.querySelector('.fish-eat');
    if(eat){eat.textContent=['nom!','yum!','mmm!','hap!','\uD83D\uDE0B'][rnd(0,4)];eat.style.display='block';eat.style.animation='none';void eat.offsetHeight;eat.style.animation='eatPop 0.8s ease forwards';setTimeout(()=>{eat.style.display='none';},800);}
    f.animate([{transform:f.style.transform+' rotate(0) scale(1)'},{transform:f.style.transform+' rotate(12deg) scale(1.2)'},{transform:f.style.transform+' rotate(-12deg) scale(1.2)'},{transform:f.style.transform+' rotate(8deg) scale(1.1)'},{transform:f.style.transform+' rotate(0) scale(1)'}],{duration:700,iterations:2});
    f.style.filter='drop-shadow(0 0 8px rgba(255,215,0,0.6))';
    setTimeout(()=>{f.style.filter='drop-shadow(0 2px 4px rgba(0,0,0,0.3))';},1400);
  },650);
  setTimeout(()=>{f._feeding=false;swimFish(f);},2200);
}

  const label=step.label[l]||step.label.en;

  if(!wasCorrect){
    const pick=step.opts[rnd(0,step.opts.length-1)];
    applyDressupChoice(step,pick);
    document.getElementById('du-step-label').textContent=`${label}: ${pick.name[l]||pick.name.en}`;
    document.getElementById('du-auto-msg').textContent={en:'Wrong answer - system chose!',tr:'Yanlış cevap - sistem seçti!',es:'Respuesta incorrecta - el sistema eligió!',ar:'إجابة خاطئة - النظام اختار!',ru:'Неправильный ответ - система выбрала!'}[currentLang]||'Wrong answer - system chose!';
    document.getElementById('du-auto-msg').classList.remove('cp-hidden');
    document.getElementById('du-choices').innerHTML='';
    duCompletedSteps.push({step,chosen:pick,index:duStep});
    duStep++;
    updateReEditButtons();
    return;
  }

  document.getElementById('du-auto-msg').classList.add('cp-hidden');
  document.getElementById('du-step-label').textContent=currentLang==='tr'?`${label} sec!`:`Pick ${label}!`;
  renderDuChoices(step,duStep);
}

function renderDuChoices(step,stepIndex,isReEdit){
  const l=currentLang;
  const label=step.label[l]||step.label.en;
  const choicesDiv=document.getElementById('du-choices');
  choicesDiv.innerHTML='';
  step.opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='du-choice';
    const dotStyle=`background:${opt.color}`;
    btn.innerHTML=`<span class="color-dot" style="${dotStyle};${opt.color==='transparent'?'border-style:dashed':''}"></span>${opt.name[l]||opt.name.en}`;
    btn.onclick=()=>{
      applyDressupChoice(step,opt);
      // Highlight selected, allow re-selection
      choicesDiv.querySelectorAll('.du-choice').forEach(b=>b.classList.remove('picked'));
      btn.classList.add('picked');
      if(!isReEdit){
        // First selection for this step - track it
        const existing=duCompletedSteps.find(r=>r.step.id===step.id);
        if(existing){existing.chosen=opt;}
        else{duCompletedSteps.push({step,chosen:opt,index:stepIndex});duStep++;}
        updateReEditButtons();
      } else {
        const rec=duCompletedSteps.find(r=>r.step.id===step.id);
        if(rec)rec.chosen=opt;
        updateReEditButtons();
      }
      document.getElementById('du-step-label').textContent=`${label}: ${opt.name[l]||opt.name.en} \u2713`;
    };
    choicesDiv.appendChild(btn);
  });
}

function updateReEditButtons(){
  // Remove old re-edit area
  let area=document.getElementById('du-reedit-area');
  if(!area){
    area=document.createElement('div');
    area.id='du-reedit-area';
    area.style.cssText='display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:4px';
    document.getElementById('du-choices').after(area);
  }
  area.innerHTML='';
  if(duCompletedSteps.length===0)return;
  const l=currentLang;
  const title=document.createElement('div');
  title.className='du-reedit';
  title.textContent=currentLang==='tr'?'Degistir:':'Change:';
  title.style.width='100%';
  area.appendChild(title);
  duCompletedSteps.forEach(rec=>{
    const btn=document.createElement('button');
    btn.className='du-choice';
    btn.style.cssText='padding:4px 8px;font-size:0.7rem;min-height:28px';
    const lbl=rec.step.label[l]||rec.step.label.en;
    btn.innerHTML=`<span class="color-dot" style="width:14px;height:14px;background:${rec.chosen.color}"></span>${lbl}`;
    btn.onclick=()=>{
      document.getElementById('du-step-label').textContent=currentLang==='tr'?`${lbl} degistir!`:`Change ${lbl}!`;
      document.getElementById('du-auto-msg').classList.add('cp-hidden');
      renderDuChoices(rec.step,rec.index,true);
    };
    area.appendChild(btn);
  });
}

function applyDressupChoice(step,opt){
  // Show SVG groups
  step.show.forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      if(opt.hide){el.classList.add('svg-hidden');return;}
      el.classList.remove('svg-hidden');
    }
  });
  // Apply fill color to SVG elements
  if(step.svgFill)(step.svgFill).forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(opt.hide){el.classList.add('svg-hidden');return;}
    // For groups, set fill on all children
    if(el.tagName==='g'){
      el.querySelectorAll('*').forEach(c=>{
        if(c.getAttribute('fill')&&c.getAttribute('fill')!=='none'&&c.getAttribute('fill')!=='white'&&!c.getAttribute('fill').startsWith('rgba'))
          c.setAttribute('fill',opt.color);
      });
    } else {
      el.setAttribute('fill',opt.color);
    }
  });
  // Apply stroke color
  if(step.svgStroke)(step.svgStroke).forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(opt.hide){el.classList.add('svg-hidden');return;}
    if(el.tagName==='g'){
      el.querySelectorAll('*').forEach(c=>{
        if(c.getAttribute('stroke'))c.setAttribute('stroke',opt.color);
      });
    } else {
      el.setAttribute('stroke',opt.color);
    }
  });
}

document.addEventListener('DOMContentLoaded',()=>{initParticles();initAquarium();renderLeaderboard();init3DRotate();setLang(currentLang);});

// 3D character rotation with mouse drag
function init3DRotate(){
  const container=document.getElementById('char-container');
  if(!container)return;
  let dragging=false,startX=0,currentRotY=0,targetRotY=0;
  container.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;e.preventDefault();});
  container.addEventListener('touchstart',e=>{dragging=true;startX=e.touches[0].clientX;});
  window.addEventListener('mousemove',e=>{if(!dragging)return;const dx=e.clientX-startX;targetRotY=currentRotY+dx*0.5;applyRot();});
  window.addEventListener('touchmove',e=>{if(!dragging)return;const dx=e.touches[0].clientX-startX;targetRotY=currentRotY+dx*0.5;applyRot();});
  window.addEventListener('mouseup',()=>{if(dragging){currentRotY=targetRotY;dragging=false;}});
  window.addEventListener('touchend',()=>{if(dragging){currentRotY=targetRotY;dragging=false;}});
  // Spring back to front after release
  function applyRot(){
    const body=document.getElementById('char-body');
    if(body){
      // Clamp rotation to -40 to 40 degrees
      const clamped=Math.max(-40,Math.min(40,targetRotY));
      body.style.transform=`translateX(-50%) rotateY(${clamped}deg)`;
    }
  }
  // Auto spring back
  setInterval(()=>{
    if(!dragging&&Math.abs(currentRotY)>0.5){
      currentRotY*=0.92;
      targetRotY=currentRotY;
      const body=document.getElementById('char-body');
      if(body)body.style.transform=`translateX(-50%) rotateY(${currentRotY}deg)`;
    }
  },30);
}

// YouTube floating popup — hover (desktop) + tap (mobile)
(function(){
  const wrap=document.getElementById('yt-float-wrap');
  const popup=document.getElementById('yt-popup');
  if(!wrap||!popup)return;
  let hideTimer=null;
  function show(){clearTimeout(hideTimer);popup.classList.add('visible');}
  function hide(){hideTimer=setTimeout(()=>popup.classList.remove('visible'),300);}
  // Desktop: hover
  wrap.addEventListener('mouseenter',show);
  wrap.addEventListener('mouseleave',hide);
  // Mobile: tap toggle
  wrap.querySelector('#yt-float-btn').addEventListener('click',e=>{
    e.stopPropagation();
    popup.classList.toggle('visible');
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('#yt-float-wrap'))popup.classList.remove('visible');
  });
})();
</script>
